services:
  app:
    build:
      context: .
    image: adrobot-app:local
    environment:
      DATABASE_URL: postgresql+psycopg://adrobot:adrobot@postgres:5432/adrobot
      KEITARO_BASE_URL: ${KEITARO_BASE_URL}
      KEITARO_API_KEY: ${KEITARO_API_KEY}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "alembic upgrade head &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000"

  test:
    build:
      context: .
      target: test
    image: adrobot-app:test
    environment:
      DATABASE_URL: postgresql+psycopg://adrobot:adrobot@postgres:5432/adrobot
      KEITARO_BASE_URL: http://keitaro.example
      KEITARO_API_KEY: test-key
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "alembic upgrade head &&
      pytest -q"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adrobot
      POSTGRES_USER: adrobot
      POSTGRES_PASSWORD: adrobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adrobot -d adrobot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
